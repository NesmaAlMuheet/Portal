<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nesma Al Muheet | Login</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">N</div>
        <div class="brand-text">
          <h1>Nesma Al Muheet</h1>
          <p>Sign in to continue</p>
        </div>
      </div>

      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="username" inputmode="email"
            aria-label="Email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-box">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
              aria-label="Password" />
            <button type="button" id="togglePassword" class="toggle-btn">Show</button>
          </div>
        </div>

        <div id="message" class="message" style="display:none;"></div>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
