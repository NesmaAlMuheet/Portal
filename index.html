<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NESMA Contractings | Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="auth-page">
    <div class="auth-card">
        <h1>NESMA Contractings</h1>
        <p class="muted">Construction Workshop Management Portal</p>

        <form id="loginForm" class="auth-form">
            <label for="username">User ID</label>
            <input type="text" id="username" autocomplete="off" placeholder="admin" />

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="admin" />

            <button type="submit" class="primary-btn">Login</button>
            <p id="loginMsg" class="msg"></p>
        </form>
    </div>

    <script src="login.js"></script>
</body>

</html>
