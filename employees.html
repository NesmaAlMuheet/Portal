<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nesma Al Muheet | Employees</title>
  <link rel="stylesheet" href="employees.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Employee Management</h1>
        <p>Add, edit, delete, and view all employees from one place.</p>
      </div>

      <nav class="topnav">
        <a href="index.html">Home</a>
        <a href="attendance.html">Attendance</a>
      </nav>
    </header>

    <section class="content-grid">
      <div class="card">
        <div class="card-head">
          <h2 id="formTitle">Add Employee</h2>
          <button type="button" id="resetBtn" class="ghost-btn">Clear</button>
        </div>

        <form id="employeeForm" class="form">
          <div class="field">
            <label for="employeeCode">Employee Code *</label>
            <input type="text" id="employeeCode" placeholder="EMP001" required />
          </div>

          <div class="field">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" placeholder="Enter full name" required />
          </div>

          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Enter phone number" />
          </div>

          <div class="field">
            <label for="department">Department / Work Type</label>
            <input type="text" id="department" placeholder="Example: Civil, Plumbing, Helper" />
          </div>

          <div class="field">
            <label for="dailyWage">Daily Wage</label>
            <input type="number" id="dailyWage" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label for="otRatePerHour">OT Rate / Hour</label>
            <input type="number" id="otRatePerHour" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label for="advanceBalance">Advance Balance</label>
            <input type="number" id="advanceBalance" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label for="joinDate">Join Date</label>
            <input type="date" id="joinDate" />
          </div>

          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>

          <div class="field full">
            <label for="address">Address</label>
            <textarea id="address" rows="3" placeholder="Enter address"></textarea>
          </div>

          <div class="actions full">
            <button type="submit" id="saveBtn" class="primary-btn">Save Employee</button>
          </div>
        </form>

        <div id="message" class="message" style="display:none;"></div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>Current Employees</h2>
          <div class="filters">
            <input type="search" id="searchInput" placeholder="Search by name / code / phone" />
            <select id="statusFilter">
              <option value="All">All</option>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Department</th>
                <th>Wage</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="employees.js"></script>
</body>
</html>
